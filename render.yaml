services:
  - type: web
    name: pneumonia-detector
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT web_app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: MODEL_PATH
        value: pneumonia_unknown_model.pth
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: USE_GPU
        value: "false"
